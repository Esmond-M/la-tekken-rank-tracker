name: Update Ranks

on:
  schedule:
    # Daily at 8 AM UTC (3 AM Central)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest ranks
        run: node scripts/update-ranks.js
        env:
          EWGF_API_KEY: ${{ secrets.EWGF_API_KEY }}

      - name: Commit updated ranks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ranks.json
          git diff --staged --quiet || git commit -m "chore: update ranks [skip ci]"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
