name: Update Ranks

on:
  schedule:
    # Daily at 8 AM UTC (3 AM Central)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      player_ids:
        description: 'Comma-separated Tekken IDs to fetch only specific players (leave blank for all). E.g. 2T7Ay7t77iha,2bhAGQRT2tBQ'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Fetch latest ranks
        run: |
          if [ -n "${{ github.event.inputs.player_ids }}" ]; then
            echo "Fetching specific players: ${{ github.event.inputs.player_ids }}"
            node scripts/update-ranks.js --player "${{ github.event.inputs.player_ids }}"
          else
            node scripts/update-ranks.js
          fi
        env:
          EWGF_API_KEY: ${{ secrets.EWGF_API_KEY }}

      - name: Commit updated ranks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add each data file independently so a missing file doesn't block the others.
          for f in public/data/ranks.json data/api-cache.json .rate-limit-log.json; do
            if [ -f "$f" ]; then
              git add "$f"
              echo "Staged: $f"
            else
              echo "::warning::Expected output file missing: $f"
            fi
          done

          echo "--- Files staged for commit: ---"
          git diff --staged --name-only

          git diff --staged --quiet || git commit -m "chore: update ranks [skip ci]"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Report run results
        if: always()
        run: |
          node << 'EOF'
          const fs = require('fs');
          let data;
          try {
            data = JSON.parse(fs.readFileSync('public/data/ranks.json', 'utf8'));
          } catch (e) {
            console.log('::error title=Missing Output::ranks.json not found — update script may have crashed entirely');
            process.exit(1);
          }

          const { stats, updated_at } = data;
          const total = stats.successful + stats.failed;

          // Write a summary table visible on the workflow run page
          const lines = [
            '## Rank Update Summary',
            '',
            `**Run:** ${updated_at}`,
            '',
            '| Status | Count |',
            '|--------|-------|',
            `| ✅ Updated from API | ${stats.successful} |`,
            `| ❌ Failed | ${stats.failed} |`,
            `| ⏭️ Skipped / fallback | ${stats.skipped} |`,
          ];

          if (stats.rate_limit_hit) {
            lines.push('', `> ⚠️ **Rate limit hit** — ${stats.skipped_rate_limit_count ?? '?'} player(s) fell back to stale data from players.json. Quota resets midnight UTC.`);
          }
          if (stats.failed > 0) {
            lines.push('', `> ⚠️ **${stats.failed} player(s) failed** to fetch from the API. Check step logs for details.`);
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');

          // Fail the job on critical issues — this is what triggers the GitHub email notification
          const criticalFailure = stats.rate_limit_hit || (total > 0 && stats.failed / total > 0.25);
          if (criticalFailure) {
            console.log('::error title=Notification::Job marked failed to trigger email alert. See summary above for details.');
            process.exit(1);
          }
          EOF
